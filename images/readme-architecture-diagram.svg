<svg width="1200" height="320" viewBox="0 0 1200 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Hermes local stack architecture</title>
  <desc id="desc">User talks to Hermes. Hermes can call llama.cpp directly or use the claude-code skill, which delegates to Claude Code, then LiteLLM, then llama.cpp.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7F5EF"/>
      <stop offset="1" stop-color="#EEF5F8"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F6F8FA"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="1200" height="320" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0F172A" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4B5563"/>
    </marker>
    <style>
      .label { font: 600 24px 'Segoe UI', Arial, sans-serif; fill: #0F172A; }
      .caption { font: 500 15px 'Segoe UI', Arial, sans-serif; fill: #475569; }
      .small { font: 600 14px 'Segoe UI', Arial, sans-serif; letter-spacing: 0.08em; text-transform: uppercase; fill: #64748B; }
      .line { stroke: #4B5563; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow); }
      .direct { stroke: #0F766E; }
      .bridge { stroke: #B45309; }
      .node { fill: url(#card); stroke: #CBD5E1; stroke-width: 2; rx: 18; }
    </style>
  </defs>

  <rect x="0" y="0" width="1200" height="320" rx="28" fill="url(#bg)"/>

  <text x="70" y="58" class="small">Local coding flow</text>

  <g filter="url(#shadow)">
    <rect x="70" y="108" width="140" height="84" class="node"/>
    <text x="140" y="146" text-anchor="middle" class="label">User</text>
    <text x="140" y="170" text-anchor="middle" class="caption">CLI or Telegram</text>

    <rect x="290" y="108" width="160" height="84" class="node"/>
    <text x="370" y="146" text-anchor="middle" class="label">Hermes</text>
    <text x="370" y="170" text-anchor="middle" class="caption">agent loop</text>

    <rect x="530" y="48" width="170" height="84" class="node"/>
    <text x="615" y="86" text-anchor="middle" class="label">llama.cpp</text>
    <text x="615" y="110" text-anchor="middle" class="caption">direct local path</text>

    <rect x="530" y="188" width="190" height="84" class="node"/>
    <text x="625" y="226" text-anchor="middle" class="label">claude-code</text>
    <text x="625" y="250" text-anchor="middle" class="caption">skill trigger</text>

    <rect x="800" y="188" width="180" height="84" class="node"/>
    <text x="890" y="226" text-anchor="middle" class="label">Claude Code</text>
    <text x="890" y="250" text-anchor="middle" class="caption">tool runtime</text>

    <rect x="1020" y="188" width="130" height="84" class="node"/>
    <text x="1085" y="226" text-anchor="middle" class="label">LiteLLM</text>
    <text x="1085" y="250" text-anchor="middle" class="caption">bridge</text>
  </g>

  <path d="M 210 150 L 290 150" class="line"/>
  <path d="M 450 140 C 485 140, 490 100, 530 90" class="line direct"/>
  <path d="M 450 160 C 485 160, 490 230, 530 230" class="line bridge"/>
  <path d="M 720 230 L 800 230" class="line bridge"/>
  <path d="M 980 230 L 1020 230" class="line bridge"/>
  <path d="M 1150 230 C 1165 230, 1165 90, 700 90" class="line bridge"/>

  <text x="744" y="72" class="caption" fill="#0F766E">Preferred fast path</text>
  <text x="748" y="294" class="caption" fill="#B45309">Claude Code compatibility path via LiteLLM</text>
</svg>
