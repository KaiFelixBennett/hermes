# Hermes Agent CLI Configuration - llama.cpp Setup
# WSL2 mit mirrored networking -> localhost == Windows-localhost

# Custom-Provider-Definition: llama.cpp (OpenAI-API-kompatibel).
# Wichtig: 'provider' unten muss "custom:<key>" lauten, damit Hermes
# den Endpoint aus dieser Datei verwendet.
# Der Modellname muss exakt der id aus GET /v1/models entsprechen.
providers:
  # Wichtig: nicht den rohen Key "llamacpp" verwenden. Hermes aliasiert diesen
  # intern auf den eingebauten Provider "custom", wodurch Auxiliary-Routing den
  # benannten Custom-Provider nicht mehr findet.
  local-llama-cpp:
    name: "llama.cpp"
    base_url: "http://127.0.0.1:8080/v1"
    api_key: "llama.cpp"           # Platzhalter - lokal i.d.R. ignoriert
    api_mode: "chat_completions"
    default_model: "Qwen3.6-27B-MTP GGUF"
    model: "Qwen3.6-27B-MTP GGUF"
    models:
      - "Qwen3.6-27B-MTP GGUF"     # Starte llama.cpp am besten mit exakt diesem Alias

model:
  # Physischer GGUF-Pfad fuer den lokalen llama.cpp-Start. Fuer ein anderes
  # Modell hier nur den Dateipfad aendern; start_llamacpp.ps1 liest diesen Wert
  # direkt ein und muss dann nicht mehr manuell editiert werden.
  path: 'E:\Coding\custom-rag\data\models\qwen3.6-27b-mtp\Qwen3.6-27B-Q4_K_M-mtp.gguf'
  # API-Alias fuer Hermes und llama.cpp /v1/models. Bei Modellwechsel diesen
  # Alias und die Provider-Eintraege unten konsistent mit dem geladenen Modell
  # halten.
  default: "Qwen3.6-27B-MTP GGUF"
  # Installierte Backends fuer start_llamacpp.ps1:
  # - "vulkan" -> tools/llama.cpp/b9284-win-vulkan-x64
  # - "hip"    -> tools/llama.cpp/b9284-win-hip-radeon-x64
  # Zum Wechsel nur diesen Wert aendern oder HERMES_LLAMACPP_BACKEND setzen.
  backend: "hip"
  # Optional: exakter Unterordner unter tools/llama.cpp, z.B.
  # "b9284-win-hip-radeon-x64". Leer lassen fuer automatische Auswahl passend
  # zu backend.
  # binary_dir: "b9284-win-hip-radeon-x64"
  provider: "custom:local-llama-cpp"
  base_url: "http://127.0.0.1:8080/v1"
  api_key: "llama.cpp"
  # 96K reduziert Session-Splits und lokale Auto-Compression deutlich gegenueber
  # 64K, bleibt aber noch realistischer als 128K auf dem aktuellen Host. 
  
  context_length: 65536
  # Sampling fuer Instruct / non-thinking Modus.
  temperature: 0.7
  top_p: 0.80
  top_k: 20
  min_p: 0.0
  presence_penalty: 1.5
  repeat_penalty: 1.0
  # llama.cpp MTP / speculative decoding fuer das geladene MTP-GGUF.
  # Wir mappen hier nur die naechsten llama.cpp-Pendants; kein Neustart hier.
  speculative_type: "draft-mtp"
  speculative_draft_tokens: 4

tools:
  enabled:
    - bash
    - read_file
    - write_file
    - edit_file
    - web_search
    - browser

tts:
  provider: "local"
  model: "tiny"

stt:
  provider: "local"
  model: "base"

compression:
  enabled: true
  threshold: 0.60
  protect_last_n: 12
  summary_model: "Qwen3.6-27B-MTP GGUF"

# Lokale 27B-Modelle reagieren deutlich traeger auf Background-Tasks als Cloud-APIs.
# Deshalb pinnen wir die Aufgaben explizit auf den benannten lokalen Provider und
# halten die Timeouts bewusst enger, damit Hermes nicht minutenlang in stillen
# Nebenlaeufen haengen bleibt.
auxiliary:
  vision: { provider: "custom:local-llama-cpp", model: "Qwen3.6-27B-MTP GGUF", timeout: 120 }
  web_extract: { provider: "custom:local-llama-cpp", model: "Qwen3.6-27B-MTP GGUF", timeout: 120 }
  compression: { provider: "custom:local-llama-cpp", model: "Qwen3.6-27B-MTP GGUF", timeout: 180 }
  session_search: { provider: "custom:local-llama-cpp", model: "Qwen3.6-27B-MTP GGUF", timeout: 90 }
  skills_hub: { provider: "custom:local-llama-cpp", model: "Qwen3.6-27B-MTP GGUF", timeout: 90 }
  approval: { provider: "custom:local-llama-cpp", model: "Qwen3.6-27B-MTP GGUF", timeout: 60 }
  mcp: { provider: "custom:local-llama-cpp", model: "Qwen3.6-27B-MTP GGUF", timeout: 120 }
  flush_memories: { provider: "custom:local-llama-cpp", model: "Qwen3.6-27B-MTP GGUF", timeout: 45 }
  title_generation: { provider: "custom:local-llama-cpp", model: "Qwen3.6-27B-MTP GGUF", timeout: 15 }

terminal:
  timeout: 300

browser:
  inactivity_timeout: 300
  dialog_timeout_s: 600

gateway:
  allowed_users: []
