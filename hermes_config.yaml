# Hermes Agent CLI Configuration - llama.cpp Setup
# WSL2 with mirrored networking -> localhost == Windows localhost

# Custom provider definition: llama.cpp (OpenAI API compatible).
# Important: 'provider' below must be "custom:<key>" so Hermes
# uses the endpoint from this file.
# The model name must exactly match the id from GET /v1/models.
providers:
  # Important: do not use the raw key "llamacpp". Hermes aliases it
  # internally to the built-in provider "custom", which prevents
  # auxiliary routing from finding this named custom provider.
  local-llama-cpp:
    name: "llama.cpp"
    base_url: "http://127.0.0.1:8080/v1"
    api_key: "llama.cpp"           # Placeholder - usually ignored for local runs
    api_mode: "chat_completions"
    default_model: "Qwen3.6-27B-MTP GGUF"
    model: "Qwen3.6-27B-MTP GGUF"
    models:
      - "Qwen3.6-27B-MTP GGUF"     # Best started with this exact llama.cpp alias

model:
  # Physical GGUF path for local llama.cpp startup. For a different
  # model, only change the file path here; start_llamacpp.ps1 reads
  # this value directly, so no script edits are required.
  path: 'E:\Coding\custom-rag\data\models\qwen3.6-27b-mtp\Qwen3.6-27B-Q4_K_M-mtp.gguf'
  # API alias used by Hermes and llama.cpp /v1/models. Keep this alias
  # and the provider entries below consistent with the loaded model.
  default: "Qwen3.6-27B-MTP GGUF"
  # Installed backends for start_llamacpp.ps1:
  # - "vulkan" -> tools/llama.cpp/b9284-win-vulkan-x64
  # - "hip"    -> tools/llama.cpp/b9284-win-hip-radeon-x64
  # To switch, change only this value or set HERMES_LLAMACPP_BACKEND.
  backend: "hip"
  # Optional: exact subfolder under tools/llama.cpp, e.g.
  # "b9284-win-hip-radeon-x64". Leave empty for automatic backend-based selection.
  # binary_dir: "b9284-win-hip-radeon-x64"
  provider: "custom:local-llama-cpp"
  base_url: "http://127.0.0.1:8080/v1"
  api_key: "llama.cpp"
  # 96K reduces session splits and local auto-compression significantly
  # vs 64K, while remaining more realistic than 128K on this host.
  
  context_length: 65536
  # Sampling for instruct / non-thinking mode.
  temperature: 0.7
  top_p: 0.80
  top_k: 20
  min_p: 0.0
  presence_penalty: 1.5
  repeat_penalty: 1.0
  # llama.cpp MTP / speculative decoding for the loaded MTP GGUF.
  # This maps to the closest llama.cpp equivalents; no restart logic here.
  speculative_type: "draft-mtp"
  speculative_draft_tokens: 4

tools:
  enabled:
    - bash
    - read_file
    - write_file
    - edit_file
    - web_search
    - browser

tts:
  provider: "local"
  model: "tiny"

stt:
  provider: "local"
  model: "base"

compression:
  enabled: true
  threshold: 0.60
  protect_last_n: 12
  summary_model: "Qwen3.6-27B-MTP GGUF"

# Local 27B models are slower for background tasks than cloud APIs.
# Pin auxiliary tasks to the named local provider and keep tighter
# timeouts to avoid multi-minute silent background runs.
auxiliary:
  vision: { provider: "custom:local-llama-cpp", model: "Qwen3.6-27B-MTP GGUF", timeout: 120 }
  web_extract: { provider: "custom:local-llama-cpp", model: "Qwen3.6-27B-MTP GGUF", timeout: 120 }
  compression: { provider: "custom:local-llama-cpp", model: "Qwen3.6-27B-MTP GGUF", timeout: 180 }
  session_search: { provider: "custom:local-llama-cpp", model: "Qwen3.6-27B-MTP GGUF", timeout: 90 }
  skills_hub: { provider: "custom:local-llama-cpp", model: "Qwen3.6-27B-MTP GGUF", timeout: 90 }
  approval: { provider: "custom:local-llama-cpp", model: "Qwen3.6-27B-MTP GGUF", timeout: 60 }
  mcp: { provider: "custom:local-llama-cpp", model: "Qwen3.6-27B-MTP GGUF", timeout: 120 }
  flush_memories: { provider: "custom:local-llama-cpp", model: "Qwen3.6-27B-MTP GGUF", timeout: 45 }
  title_generation: { provider: "custom:local-llama-cpp", model: "Qwen3.6-27B-MTP GGUF", timeout: 15 }

terminal:
  timeout: 300

browser:
  inactivity_timeout: 300
  dialog_timeout_s: 600

gateway:
  allowed_users: []
